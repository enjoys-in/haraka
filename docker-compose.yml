# Scaled Docker topology for local/prod testing:
# - HAProxy fronts SMTP (:25) and submission (:587)
# - Multiple Haraka inbound/outbound instances behind HAProxy
# - Public ports are user-configurable via env vars
#
# Local test defaults (safe non-privileged ports):
#   SMTP_PUBLIC_PORT=2525
#   SUBMISSION_PUBLIC_PORT=2587
#   ADMIN_PUBLIC_PORT=3001
#
# Production example:
#   SMTP_PUBLIC_PORT=25 SUBMISSION_PUBLIC_PORT=587 ADMIN_PUBLIC_PORT=3001 docker compose up -d

x-haraka-common: &haraka-common
  image: haraka-mail
  init: true
  restart: unless-stopped
  networks:
    mailnet: {}

services:
  spamassassin:
    image: axllent/spamassassin:latest
    environment:
      - DNS_CHECKS=false
    networks:
      mailnet: {}
    restart: unless-stopped

  rspamd:
    image: rspamd/rspamd:latest
    depends_on:
      - redis
    volumes:
      - ./docker/rspamd/local.d:/etc/rspamd/local.d:ro
    networks:
      mailnet: {}
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    volumes:
      - clamav-db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      mailnet: {}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      mailnet: {}
    restart: unless-stopped

  # Local dev mailbox sink: inbound mail for local domains is forwarded here.
  # SMTP on :1025 (internal), web UI on :8025 (browse delivered mail).
  mailpit:
    image: axllent/mailpit:latest
    environment:
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    networks:
      mailnet: {}
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    <<: *haraka-common
    depends_on:
      - redis
      - spamassassin
      - rspamd
      - clamav
      - haproxy
    environment:
      HARAKA_ROLE: admin
      HOST: 0.0.0.0
      PORT: 3001
      HARAKA_CONFIG_DIR: /app/config
      REDIS_URL: redis://redis:6379
      SMTP_OUT_HOST: haproxy
      SMTP_OUT_PORT: 587
      STATUS_SMTP_HOST: haproxy
      STATUS_SMTP_PORT: 25
      STATUS_SUBMISSION_HOST: haproxy
      STATUS_SUBMISSION_PORT: 587
      STATUS_SPAMD_HOST: spamassassin
      STATUS_SPAMD_PORT: 783
      STATUS_RSPAMD_HOST: rspamd
      STATUS_RSPAMD_PORT: 11333
      STATUS_CLAMD_HOST: clamav
      STATUS_CLAMD_PORT: 3310
      STATUS_REDIS_HOST: redis
      STATUS_REDIS_PORT: 6379
      HARAKA_LOG_FILE: /app/logs/haraka.log
    ports:
      - "${ADMIN_PUBLIC_PORT:-3001}:3001"
    volumes:
      - ./config:/app/config
      - ./inbound:/app/inbound
      - ./outbound:/app/outbound
      - ./logs:/app/logs

  haraka-in-1:
    <<: *haraka-common
    depends_on:
      - redis
      - spamassassin
      - rspamd
      - clamav
    environment:
      HARAKA_ROLE: inbound
    volumes:
      - ./inbound:/app/inbound
      - ./logs:/app/logs
      - in1-spool:/app/spool
      - in1-queue:/app/queue

  haraka-in-2:
    <<: *haraka-common
    depends_on:
      - redis
      - spamassassin
      - rspamd
      - clamav
    environment:
      HARAKA_ROLE: inbound
    volumes:
      - ./inbound:/app/inbound
      - ./logs:/app/logs
      - in2-spool:/app/spool
      - in2-queue:/app/queue

  haraka-out-1:
    <<: *haraka-common
    depends_on:
      - redis
      - spamassassin
      - rspamd
      - clamav
    environment:
      HARAKA_ROLE: outbound
    volumes:
      - ./outbound:/app/outbound
      - ./logs:/app/logs
      - out1-spool:/app/spool
      - out1-queue:/app/queue

  haraka-out-2:
    <<: *haraka-common
    depends_on:
      - redis
      - spamassassin
      - rspamd
      - clamav
    environment:
      HARAKA_ROLE: outbound
    volumes:
      - ./outbound:/app/outbound
      - ./logs:/app/logs
      - out2-spool:/app/spool
      - out2-queue:/app/queue

  haproxy:
    image: haproxy:2.9-alpine
    depends_on:
      - haraka-in-1
      - haraka-in-2
      - haraka-out-1
      - haraka-out-2
    ports:
      - "${SMTP_PUBLIC_PORT:-2525}:25"
      - "${SUBMISSION_PUBLIC_PORT:-2587}:587"
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      mailnet:
        ipv4_address: 172.30.0.10
    restart: unless-stopped

volumes:
  clamav-db:
  redis-data:
  in1-spool:
  in1-queue:
  in2-spool:
  in2-queue:
  out1-spool:
  out1-queue:
  out2-spool:
  out2-queue:

networks:
  mailnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
