; INBOUND instance — MTA listens on port 25 only.
listen=0.0.0.0:25

; public IP (helps SPF / GeoIP behind NAT)
public_ip=18.119.59.156

; Run one worker per CPU core for throughput
;nodes=cpus

; Spool large messages to disk (dir must exist; relative to project root)
spool_dir=spool

daemon_log_file=haraka.log

[headers]
max_lines=1000
max_received=100
