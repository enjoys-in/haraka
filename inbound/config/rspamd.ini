; rspamd connection — provided by the 'rspamd' docker service.
host = rspamd
port = 11333
scheme = http
path = /checkv2

; add spam headers: always | sometimes | never
add_headers = sometimes

[dkim]
; let rspamd add DKIM signatures (disabled here; Haraka's 'dkim' plugin signs)
;enabled = false

[check]
; only check authenticated/relay messages? (default: check everything)
;authenticated = false
;relay = false

[reject]
; reject messages rspamd marks as 'reject' action
;message = Detected as spam
