; Where inbound mail for local domains (config/host_list) is delivered.
; Point this at your real mailbox backend (e.g. Dovecot LMTP/SMTP).
; For local testing, example/sink.js listens on 127.0.0.1:2525.
host=127.0.0.1
;
; port to connect to
port=2525
;
; uncomment to enable TLS to the backend SMTP server
;enable_tls=true
;
; for messages that have multiple RCPT, send a separate message for each RCPT
;one_message_per_rcpt=true
;
; smtp client authorization to the backend (if it requires auth)
;auth_type=plain
;auth_user=
;auth_pass=

; Deliver authenticated relay (outbound) mail via smtp_forward too?
; Leave false so authenticated submission uses Haraka's outbound MX delivery.
enable_outbound=false
