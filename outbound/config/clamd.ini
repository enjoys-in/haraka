[main]
; ClamAV (clamd) connection — provided by the 'clamav' docker service.
; Comma/space separated list of host:port (or unix sockets) to try.
clamd_socket=clamav:3310

; randomize the order hosts are tried (for multiple clamd hosts)
;randomize_host_order=true

; only scan messages smaller than this many bytes (default: 26214400)
;max_size=26214400

; what to do when clamd is unreachable: tempfail (defer) is safest
;tmp_fail_code=denysoft
