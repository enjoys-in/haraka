; SpamAssassin (spamd) connection — provided by the 'spamassassin' docker service.
; TCP: host:port  (socket also supported, e.g. /var/run/spamd/spamd.sock)
spamd_socket=127.0.0.1:783

; messages larger than this (bytes) are not scored
max_size=500000

; Subject prefix for messages over munge_subject_threshold
subject_prefix=*** SPAM ***
; munge_subject_threshold=5

; what to do with incoming messages that already have X-Spam-* headers
; options: rename, drop, keep
old_headers_action=rename

modern_status_syntax=1

; Reject messages scoring higher than this (uncomment to enable rejection)
;reject_threshold=10
; For connections with relay privileges
;relay_reject_threshold=7

; timeouts (seconds)
;connect_timeout=30
;results_timeout=300
